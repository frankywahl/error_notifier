name: Run the tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'

jobs:
  test:
    runs-on: "ubuntu-latest"
    strategy:
      matrix:
        ruby:
          - 3.3
          - 3.4
          - 4.0
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run the tests
        run: bundle exec rake
